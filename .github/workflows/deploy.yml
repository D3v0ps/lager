name: Deploy to One.com

on:
  push:
    branches:
      - main
      - claude/new-session-setup-A10ee
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ------------------------------------------------------------------
      # Build Next.js static export FIRST so we fail fast on TS / build
      # errors before we touch the database.
      # ------------------------------------------------------------------
      - name: Build Next.js static export
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      # ------------------------------------------------------------------
      # Apply Supabase migrations + deploy Edge Functions
      #
      # Required GitHub secrets:
      #   SUPABASE_ACCESS_TOKEN  — personal access token from
      #                            https://supabase.com/dashboard/account/tokens
      #   SUPABASE_PROJECT_REF   — your project ref (8-char id from URL)
      #   SUPABASE_DB_PASSWORD   — database password for the project
      #                            (Settings → Database → Database password)
      #
      # `db push` is idempotent — only migrations that haven't been
      # applied are run. Tracking happens in
      # supabase_migrations.schema_migrations.
      # ------------------------------------------------------------------
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply database migrations
        env:
          # Canonical pattern for supabase CLI in CI: pass everything as env
          # vars, no flags. The CLI reads SUPABASE_DB_PASSWORD when prompted
          # by `link`, and SUPABASE_ACCESS_TOKEN for auth.
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          supabase link --project-ref "$PROJECT_REF"
          # `db push --linked` requires a successful link in the same step.
          # On a fresh project the migrations table is empty so all migrations
          # run; on an already-seeded project it's a no-op (CLI checks
          # supabase_migrations.schema_migrations).
          supabase db push --linked

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -uo pipefail
          # Deploy each function under supabase/functions/ to the linked
          # project. Continue on individual failures so one bad function
          # doesn't block the rest of the deploy.
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            echo "::group::Deploy $name"
            supabase functions deploy "$name" --project-ref "$PROJECT_REF" || \
              echo "::warning::Edge function $name failed to deploy"
            echo "::endgroup::"
          done

      # ------------------------------------------------------------------
      # SFTP — only runs if the build + DB migrations succeeded above.
      # ------------------------------------------------------------------
      - name: Deploy to One.com via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          local_path: './out/*'
          remote_path: ${{ secrets.SSH_REMOTE_PATH }}
          delete_remote_files: false
